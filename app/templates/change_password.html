{% extends "base.html" %}
{% block title %}Change Password — TaskFlow{% endblock %}
{% block content %}
<div class="page-head"><h1>Change Password</h1></div>

<p class="muted">Update the password for your own account
(<code>{{ user.username }}</code>). Minimum 8 characters.</p>

{% if error %}<div class="flash flash-error" id="password-error">{{ error }}</div>{% endif %}

<form method="post" action="/account/password" class="form card" id="change-password-form">
  <label for="current_password">Current password</label>
  <input type="password" id="current_password" name="current_password"
         autocomplete="current-password" required>

  <label for="new_password">New password</label>
  <input type="password" id="new_password" name="new_password"
         autocomplete="new-password" minlength="8" required>

  <label for="confirm_password">Confirm new password</label>
  <input type="password" id="confirm_password" name="confirm_password"
         autocomplete="new-password" minlength="8" required>

  <div class="form-actions">
    <button type="submit" id="change-password-submit" class="btn btn-primary">Change password</button>
    <a href="/dashboard" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
